# Docker Compose para desenvolvimento local
# Uso: docker compose -f docker-compose.dev.yml up -d
#
# Sobe apenas PostgreSQL e Redis com portas expostas para o host.
# O Next.js roda localmente com: npm run dev (dentro de /panel)

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-meuzapdesk_dev}
      - POSTGRES_USER=${POSTGRES_USER:-meuzapdesk}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-devsenha123}
    ports:
      - "5433:5432"
    volumes:
      - pg_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-meuzapdesk}"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_dev_data:/data

  waha:
    image: devlikeapro/waha:latest
    platform: linux/amd64
    restart: unless-stopped
    ports:
      - "3002:3000"
    environment:
      - WAHA_API_KEY=${WAHA_API_KEY:-dev-waha-key}
      - WAHA_LOG_LEVEL=info
      - TZ=America/Sao_Paulo
    volumes:
      - waha_dev_data:/app/sessions

  n8n:
    image: n8nio/n8n:latest
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://localhost:5678
      - GENERIC_TIMEZONE=America/Sao_Paulo
      - N8N_BASIC_AUTH_ACTIVE=false
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - n8n_dev_data:/home/node/.n8n

volumes:
  pg_dev_data:
  redis_dev_data:
  waha_dev_data:
  n8n_dev_data:
