# Docker Compose para desenvolvimento local
# Uso: docker compose -f docker-compose.dev.yml up -d
#
# Sobe apenas PostgreSQL e Redis com portas expostas para o host.
# O Next.js roda localmente com: npm run dev (dentro de /panel)

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-meuzapdesk_dev}
      - POSTGRES_USER=${POSTGRES_USER:-meuzapdesk}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-devsenha123}
    ports:
      - "5433:5432"
    volumes:
      - pg_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-meuzapdesk}"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_dev_data:/data

volumes:
  pg_dev_data:
  redis_dev_data:
