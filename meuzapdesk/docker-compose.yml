services:
  waha:
    image: devlikeapro/waha:latest
    platform: linux/amd64
    restart: unless-stopped
    environment:
      - WAHA_API_KEY=${WAHA_API_KEY}
      - WAHA_LOG_LEVEL=info
      - TZ=America/Sao_Paulo
    volumes:
      - waha_data:/app/sessions
    networks:
      - meuzapdesk_net

  nextjs:
    build:
      context: ./panel
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-meuzapdesk}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-meuzapdesk}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - NEXTAUTH_URL=${NEXTAUTH_URL:-http://localhost:3000}
      - REDIS_URL=redis://redis:6379
      - WAHA_API_URL=http://waha:3000
      - WAHA_API_KEY=${WAHA_API_KEY}
      - WAHA_WEBHOOK_SECRET=${WAHA_WEBHOOK_SECRET}
    ports:
      - "3000:3000"
    depends_on:
      - postgres
      - redis
      - waha
    networks:
      - meuzapdesk_net

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-meuzapdesk}
      - POSTGRES_USER=${POSTGRES_USER:-meuzapdesk}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-meuzapdesk}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - meuzapdesk_net

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - meuzapdesk_net

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - nextjs
      - waha
    networks:
      - meuzapdesk_net

volumes:
  waha_data:
  pg_data:
  redis_data:

networks:
  meuzapdesk_net:
    driver: bridge
